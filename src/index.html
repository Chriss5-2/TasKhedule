<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Mi Sistema RPG</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>

    <div style="position: absolute; top: 20px; right: 20px;">
        <div style="margin-bottom: 5px; text-align: right;">
            <label style="font-size: 12px; cursor: pointer;">
                <input type="checkbox" id="dev-mode-toggle" onchange="toggleDevMode()"> Modo Desarrollador
            </label>
        </div>
        <input type="file" id="import-csv-input" accept=".csv" style="display: none;" onchange="importCSV(this)">
        <button onclick="document.getElementById('import-csv-input').click()" style="padding: 10px; cursor: pointer; border-radius: 5px; border: none; background-color: #17a2b8; color: white; font-weight: bold; box-shadow: 0px 0px 5px gray; margin-right: 5px;">Importar CSV</button>
        <button onclick="showGeneralSchedule()" style="padding: 10px; cursor: pointer; border-radius: 5px; border: none; background-color: #007bff; color: white; font-weight: bold; box-shadow: 0px 0px 5px gray; margin-right: 5px;">Cronograma General</button>
        <button onclick="showHistory()" style="padding: 10px; cursor: pointer; border-radius: 5px; border: none; background-color: #28a745; color: white; font-weight: bold; box-shadow: 0px 0px 5px gray;">Historial</button>
        
        <!-- Controles Dev Mode -->
        <div id="dev-controls" style="display: none; margin-top: 10px; padding: 5px; border: 1px dashed red; background: #fff0f0;">
            <div style="display: flex; gap: 5px; align-items: center;">
                <h4 style="margin: 0; color: red;">Dev Tools</h4>
                <button onclick="simulateNextDay()" style="padding: 5px; cursor: pointer; background-color: purple; color: white; border: none; border-radius: 3px; font-size: 12px;">⏩ Siguiente</button>
                <button onclick="document.getElementById('dev-date-input').showPicker()" style="padding: 5px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 3px; font-size: 12px;">📅 Ir a Fecha</button>
                <input type="date" id="dev-date-input" style="width: 0; height: 0; opacity: 0; position: absolute;" onchange="navigateToDate(this.value)">
            </div>
            <div id="simulated-date-display" style="font-size: 11px; color: #d00; margin-top: 2px; font-weight: bold;"></div>
        </div>
    </div>

    <h1>Mi Sistema RPG</h1>

    <div style="display: flex; justify-content: center; gap: 20px; align-items: center;">
        <h3 id="points-container">Puntos: <span id="points">0</span></h3>
        <div style="display: flex; align-items: center; gap: 5px;">
             <h3 id="streak-container" style="color: #ff9800;">🔥 Racha: <span id="streak">0</span> días</h3>
             <button id="reset-streak-btn" onclick="resetStreak()" style="display: none; font-size: 10px; padding: 2px 5px; cursor: pointer; border-radius: 3px; border: 1px solid #ccc; background-color: transparent;" title="Reiniciar Racha (DEV)">✖</button>
        </div>
    </div>

    <div id="daily-view">
        <div style="margin-top: 10px;">
            <label for="day-selector"><strong>Ver cronograma de:</strong></label>
            <select id="day-selector" onchange="changeDay()" style="padding: 5px; border-radius: 5px; margin-left: 5px;">
                <option value="Monday">Lunes</option>
                <option value="Tuesday">Martes</option>
                <option value="Wednesday">Miércoles</option>
                <option value="Thursday">Jueves</option>
                <option value="Friday">Viernes</option>
                <option value="Saturday">Sábado</option>
                <option value="Sunday">Domingo</option>
            </select>
            <button onclick="resetDay()" style="margin-left: 10px; cursor: pointer; padding: 5px; border-radius: 5px; border: 1px solid #ccc;">Reiniciar Día</button>
            <button onclick="deleteAllTasks()" style="margin-left: 5px; cursor: pointer; padding: 5px; background-color: #ffc107; color: black; border: none; border-radius: 5px;">Borrar Tareas</button>
            <button onclick="resetAll()" style="margin-left: 5px; cursor: pointer; padding: 5px; background-color: #ff4c4c; color: white; border: none; border-radius: 5px;">Reiniciar Todo</button>
        </div>

        <h2 id="day"></h2>

        <div id="add-task-container" style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="new-task-input" placeholder="Nombre de la nueva tarea" style="padding: 8px; width: 200px; border-radius: 5px; border: 1px solid #ccc;">
                
                <input type="text" id="task-duration-display" placeholder="Duración (ej. 30m)" style="padding: 8px; width: 120px; border-radius: 5px; border: 1px solid #ccc; background-color: white; text-align: center;">

                <button onclick="toggleTimeInputs()" id="btn-set-time" style="cursor: pointer; padding: 8px; font-size: 14px; background-color: #6c757d; color: white; border: none; border-radius: 5px;">🕑 Establecer Horario</button>

                <div id="time-inputs-container" style="display: none; align-items: center; gap: 5px; border: 1px solid #ddd; padding: 5px; border-radius: 5px; background-color: white;">
                    <input type="time" id="new-task-start-time" onchange="calculateDuration()" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
                    <span>a</span>
                    <input type="time" id="new-task-end-time" onchange="calculateDuration()" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
                </div>

                <div style="display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="is-default-task" style="cursor: pointer;">
                    <label for="is-default-task" style="font-size: 14px; cursor: pointer;">Por defecto</label>
                </div>

                <button onclick="addTask()" style="cursor: pointer; padding: 8px 15px; background-color: #007bff; color: white; border: none; border-radius: 5px;">Agregar</button>
            </div>
        </div>

        <div id="tasks">

        </div>


        <h2>Recompensas <button id="toggle-rewards-btn" onclick="toggleRewards()" style="font-size: 14px; padding: 5px; cursor: pointer;">Desactivar Recompensas</button></h2>

        <div id="rewards-section">
            <div id="add-reward-container" style="margin-bottom: 20px;">
                <input type="text" id="new-reward-name" placeholder="Nombre de la recompensa" style="padding: 8px; width: 180px; border-radius: 5px; border: 1px solid #ccc;">
                <input type="number" id="new-reward-cost" placeholder="Costo" style="padding: 8px; width: 80px; border-radius: 5px; border: 1px solid #ccc;" min="1">
                <button onclick="addReward()" style="cursor: pointer;">Agregar Recompensa</button>
            </div>

            <div id="rewards">

            </div>
        </div>
    </div>

    <div id="general-view" style="display: none;">
        <h2>Cronograma General</h2>
        <button onclick="goToPreviousView()" style="margin-bottom: 20px; cursor: pointer; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">Volver</button>
        <div id="general-schedule-grid" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px;">
            <!-- Cards will be generated here -->
        </div>

        <h2>Recompensas Disponibles</h2>
        <div id="general-rewards-grid" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px;">
            <!-- Rewards will be generated here -->
        </div>
    </div>

    <!-- Nueva sección para Historial -->
    <div id="history-view" style="display: none;">
        <h2>Historial</h2>
        
        <div style="margin-bottom: 20px;">
            <button onclick="goToPreviousView()" style="cursor: pointer; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">Volver</button>
            <button onclick="setHistoryView('tasks')" style="margin-left: 10px; cursor: pointer; padding: 8px; border-radius: 5px; background-color: #28a745; color: white; border: none;">Ver Tareas</button>
            <button onclick="setHistoryView('rewards')" style="margin-left: 5px; cursor: pointer; padding: 8px; border-radius: 5px; background-color: #ffc107; color: black; border: none;">Ver Recompensas</button>
            <button onclick="setHistoryView('both')" style="margin-left: 5px; cursor: pointer; padding: 8px; border-radius: 5px; background-color: #17a2b8; color: white; border: none;">Ver Ambos</button>
            <button onclick="clearHistory()" style="margin-left: 20px; cursor: pointer; padding: 8px; border-radius: 5px; background-color: #dc3545; color: white; border: none;">Limpiar Historial</button>
        </div>

        <div id="history-content" style="max-width: 90%; margin: 0 auto; text-align: left; display: flex; justify-content: center; gap: 20px;">
            
            <div id="task-history-column" style="flex: 1; min-width: 300px; display: none;">
                <h3 style="text-align: center; border-bottom: 2px solid #28a745; padding-bottom: 5px;">Tareas Completadas</h3>
                <div id="task-history-list">
                    <!-- Lista de tareas -->
                </div>
            </div>

            <div id="reward-history-column" style="flex: 1; min-width: 300px; display: none;">
                <h3 style="text-align: center; border-bottom: 2px solid #ffc107; padding-bottom: 5px;">Recompensas Reclamadas</h3>
                 <div id="reward-history-list">
                    <!-- Lista de recompensas -->
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
